          type: integer
          format: int64
        campus:
          type: string
          description: GULOU=鼓楼校区，XIANLIN=仙林校区，PUKOU=浦口校区，SUZHOU=苏州校区。
          enum:
          - GULOU
          - XIANLIN
          - PUKOU
          - SUZHOU
        pickupLocation:
          type: string
          minLength: 1
          maxLength: 100
        deliveryLocation:
          type: string
          minLength: 1
          maxLength: 100
        itemDescriptionPreview:
          type: string
          maxLength: 500
        rewardType:
          "$ref": "#/components/schemas/RewardType"
        rewardAmount:
          type: number
          format: decimal
          nullable: true
        status:
          "$ref": "#/components/schemas/PickupStatus"
        cancelReason:
          "$ref": "#/components/schemas/PickupCancelReason"
