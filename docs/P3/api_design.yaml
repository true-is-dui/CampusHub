      description: 前端可先调用 GET /pickup-requests/{pickupId}/evaluation-eligibility 判断是否展示评价入口；提交时后端仍重新校验当前用户是否为服务参与者、服务是否已完成、是否已评价，并根据 pickupId 和当前登录用户自动推导被评价人。
      parameters:
      - "$ref": "#/components/parameters/PickupIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/EvaluationCreateRequest"
      responses:
        '200':
          description: 评价提交成功
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        evaluationId:
                          type: integer
                          format: int64
              example:
                code: 0
                message: ok
                data:
                  evaluationId: 1
        '400':
          description: 参数校验失败或业务规则不满足
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  request: 请求参数格式或取值不合法
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '403':
          description: 非参与者或无权限
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40301
                message: 无权限或账号状态不允许
                data: null
                errors:
                  reason: AUTH_STATUS_NOT_ALLOWED
        '409':
          description: 业务状态冲突，例如服务未完成、已评价、已取消或状态不允许评价
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40901
                message: 重复操作或业务冲突
                data: null
                errors:
                  reason: PICKUP_EVALUATION_NOT_ALLOWED
  "/pickup-requests/{pickupId}/evaluation-eligibility":
    get:
      tags:
      - Evaluations
      summary: 查询当前用户对代取服务的评价资格
      description: 用于前端决定是否展示评价入口；仅作展示辅助，提交评价时后端仍必须重新校验。
      parameters:
      - "$ref": "#/components/parameters/PickupIdPath"
      responses:
        '200':
          description: 评价资格
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/EvaluationEligibility"
              example:
                code: 0
                message: ok
                data:
                  canEvaluate: true
                  reviewee:
                    userId: 1
                    nickname: string
                  reason: null
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '403':
          description: 无权限或账号状态不允许
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40301
                message: 无权限或账号状态不允许
                data: null
                errors:
                  reason: AUTH_STATUS_NOT_ALLOWED
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40401
                message: 资源不存在
                data: null
                errors:
                  reason: RESOURCE_NOT_FOUND
