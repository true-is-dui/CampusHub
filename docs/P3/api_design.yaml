      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/PickupSummary"
    EvaluationCreateRequest:
      type: object
      required:
      - ratingLevel
      properties:
        ratingLevel:
          "$ref": "#/components/schemas/RatingLevel"
        content:
          type: string
          nullable: true
          description: ratingLevel=BAD 时必填；ratingLevel=GOOD 或 NEUTRAL 时可为空。被评价人不由前端提交，后端根据 pickupId 和当前登录用户自动推导。
          maxLength: 300
    EvaluationEligibility:
      type: object
      properties:
        canEvaluate:
          type: boolean
        reviewee:
          "$ref": "#/components/schemas/UserSummary"
          nullable: true
        reason:
          type: string
          nullable: true
          enum:
          - NOT_COMPLETED
          - NOT_PARTICIPANT
          - ALREADY_EVALUATED
          - ACCOUNT_NOT_ALLOWED
    EvaluationHistorySummary:
      type: object
      properties:
        evaluationId:
          type: integer
          format: int64
        revieweeRoleInBusiness:
          "$ref": "#/components/schemas/PickupParticipantRole"
        ratingLevel:
          "$ref": "#/components/schemas/RatingLevel"
        contentPreview:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    EvaluationHistoryPage:
      allOf:
      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/EvaluationHistorySummary"
    RatingSummary:
      type: object
      description: 按被评价人在代取服务中的角色分别动态聚合计算，不缓存结果。publisherRoleSummary 表示该用户作为发布方时收到的评价统计；acceptorRoleSummary 表示该用户作为接单方时收到的评价统计。
      properties:
        userId:
          type: integer
          format: int64
        publisherRoleSummary:
          "$ref": "#/components/schemas/RatingRoleSummary"
        acceptorRoleSummary:
          "$ref": "#/components/schemas/RatingRoleSummary"
    RatingRoleSummary:
      type: object
      properties:
        revieweeRoleInBusiness:
          "$ref": "#/components/schemas/PickupParticipantRole"
        positiveCount:
          type: integer
        neutralCount:
          type: integer
        negativeCount:
          type: integer
        totalCount:
          type: integer
        positiveRate:
          type: number
          format: double
    CheckInResult:
      type: object
      properties:
        earnedPoints:
          type: integer
          description: 本次签到获得的积分，当前 MVP 固定为 5。
        pointBalance:
          type: integer
          format: int64
          minimum: 0
          description: 签到后的当前积分余额。
    PointTransactionItem:
      type: object
      properties:
        transactionId:
          type: integer
          format: int64
        type:
          "$ref": "#/components/schemas/PointTransactionType"
        amount:
          type: integer
          format: int64
          description: 本次积分变动量，正数为入账（赠送/签到/完成入账/取消退回），负数为出账（发布扣减）。
        balanceAfter:
          type: integer
          format: int64
          minimum: 0
          description: 本次变动后的积分余额。
        relatedPickupId:
          type: integer
          format: int64
          nullable: true
          description: 关联代取服务 ID；非代取相关的赠送/签到流水为空。
        createdAt:
          type: string
          format: date-time
    PointTransactionPage:
      allOf:
      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/PointTransactionItem"
    NotificationItem:
      type: object
      properties:
        notificationId:
          type: integer
          format: int64
        type:
          type: string
          description: 通知类型，用于前端展示分类；当前 MVP 可使用 SYSTEM、PICKUP、PAYMENT 等业务值。
        title:
          type: string
        content:
          type: string
        businessType:
          "$ref": "#/components/schemas/BusinessType"
        businessId:
          type: integer
          format: int64
          nullable: true
          description: 关联业务主键，例如代取服务 pickupId；无业务关联时为空。
        readStatus:
          type: string
          enum:
          - UNREAD
          - READ
        createdAt:
          type: string
          format: date-time
    NotificationPage:
      allOf:
      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/NotificationItem"
    UserSummary:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
          description: 公开展示昵称
          minLength: 1
          maxLength: 20
        ratingSummary:
          "$ref": "#/components/schemas/RatingSummary"
          nullable: true
          description: 仅在明确需要评分摘要的接口或 includeRating=true 的场景中返回，否则为空；代取大厅、我的代取列表等普通列表默认不返回评分摘要。
    PageResult:
      type: object
      properties:
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    ReasonRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 200
    VerificationReviewSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]+$"
        nickname:
          type: string
          nullable: true
          minLength: 1
          maxLength: 20
        studentIdMasked:
          type: string
          nullable: true
        realName:
          type: string
          minLength: 2
          maxLength: 20
        status:
          "$ref": "#/components/schemas/ReviewStatus"
        rejectReason:
          type: string
          nullable: true
        reviewerId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
    VerificationReviewPage:
      allOf:
      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/VerificationReviewSummary"
    VerificationReviewPageResponse:
      allOf:
      - "$ref": "#/components/schemas/ApiResponse"
      - type: object
        properties:
          data:
            "$ref": "#/components/schemas/VerificationReviewPage"
    AdminHandleRequest:
      type: object
      description: result=REJECT 时 reason 必填；result=APPROVE 时 reason 可为空。
      required:
      - result
      properties:
        result:
          type: string
          enum:
          - APPROVE
          - REJECT
        reason:
          type: string
          nullable: true
          maxLength: 200
          description: result=REJECT 时必填；result=APPROVE 时可为空。
    ReviewStatus:
      type: string
      enum:
      - PENDING
      - APPROVED
      - REJECTED
    BusinessType:
      type: string
      description: 业务类型，仅用于通知、评价、文件等记录与业务对象的关联追踪和日志排查，不表示对应模块拥有或维护代取业务状态。
      enum:
      - PICKUP_REQUEST
    AuthStatus:
      type: string
      enum:
      - UNVERIFIED
      - REVIEWING
      - APPROVED
      - REJECTED
    PickupStatus:
      type: string
      enum:
      - WAITING_ACCEPT
      - IN_PROGRESS
      - COMPLETED
      - CANCELLED
    PickupCancelReason:
      type: string
      description: 用于说明代取服务进入 CANCELLED 状态的来源，不是新的业务状态。
      enum:
      - USER_CANCELLED
      - ACCEPT_DEADLINE_EXPIRED
      - SYSTEM_CANCELLED
    RewardType:
      type: string
      enum:
      - PAID
      - UNPAID
    PickupParticipantRole:
      type: string
      enum:
      - PUBLISHER
      - ACCEPTOR
    RatingLevel:
      type: string
      enum:
      - GOOD
      - NEUTRAL
      - BAD
    PointTransactionType:
      type: string
      description: 积分流水类型。EARN_VERIFICATION=实名认证赠送，EARN_CHECK_IN=每日签到，SPEND_PUBLISH=发布有报酬代取扣减，REFUND_CANCEL=取消有报酬代取退回，INCOME_COMPLETE=完成有报酬代取入账。
      enum:
      - EARN_VERIFICATION
      - EARN_CHECK_IN
      - SPEND_PUBLISH
      - REFUND_CANCEL
      - INCOME_COMPLETE
