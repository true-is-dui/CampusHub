          description: 仅当 status=CANCELLED 时用于解释代取服务进入取消状态的来源；不是新的业务状态。
        publisher:
          "$ref": "#/components/schemas/UserSummary"
        acceptDeadline:
          type: string
          format: date-time
          description: 接单截止时间，必须晚于当前时间，建议至少晚于当前时间 10 分钟。
        createdAt:
          type: string
          format: date-time
    PickupRequestDetail:
      allOf:
      - "$ref": "#/components/schemas/PickupRequestSummary"
      - type: object
        properties:
          itemDescription:
            type: string
            minLength: 1
            maxLength: 500
          acceptor:
            "$ref": "#/components/schemas/UserSummary"
            nullable: true
          acceptedAt:
            type: string
            format: date-time
            nullable: true
          completedAt:
            type: string
            format: date-time
            nullable: true
    PickupRequestPage:
      allOf:
      - "$ref": "#/components/schemas/PageResult"
      - type: object
        properties:
          list:
            type: array
            items:
              "$ref": "#/components/schemas/PickupRequestSummary"
    PickupSummary:
      type: object
      description: 代取服务通用展示摘要，用于我的发布、我的接单和评价详情中的关联服务背景。
      properties:
        pickupId:
          type: integer
          format: int64
        campus:
          type: string
          description: GULOU=鼓楼校区，XIANLIN=仙林校区，PUKOU=浦口校区，SUZHOU=苏州校区。
          enum:
          - GULOU
          - XIANLIN
          - PUKOU
          - SUZHOU
        pickupLocation:
          type: string
          minLength: 1
          maxLength: 100
        deliveryLocation:
          type: string
          minLength: 1
          maxLength: 100
        itemDescriptionPreview:
          type: string
          maxLength: 500
        rewardType:
          "$ref": "#/components/schemas/RewardType"
        rewardAmount:
          type: number
          format: decimal
          nullable: true
        status:
          "$ref": "#/components/schemas/PickupStatus"
        cancelReason:
          "$ref": "#/components/schemas/PickupCancelReason"
          nullable: true
          description: 仅当 status=CANCELLED 时返回，用于说明代取服务进入取消状态的来源；不是新的业务状态。
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
    PickupSummaryPage:
