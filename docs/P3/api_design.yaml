components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PickupIdPath:
      name: pickupId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ReviewIdPath:
      name: reviewId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiResponse:
      type: object
      required:
      - code
      - message
      - data
      properties:
        code:
          type: integer
          description: 业务状态码。0 表示成功；非 0 表示业务错误码，错误码前 3 位与对应 HTTP 状态码一致，例如 40001 表示
            400 类参数错误。
        message:
          type: string
          description: 面向前端展示或调试的简短处理结果说明。
        data:
          type: object
          nullable: true
          description: 成功响应数据；成功但无额外数据时固定为 null。
    ErrorResponse:
      type: object
      required:
      - code
      - message
      - data
      - errors
      properties:
        code:
          type: integer
          description: 业务错误码。当前 MVP 使用：40001=请求参数错误，40101=认证失败，40301=权限或账号状态不允许，40401=资源不存在，40901=业务状态冲突，50001=系统内部异常，50201=第三方服务异常。
        message:
          type: string
          description: 面向前端展示或调试的错误说明。
        data:
          type: object
          nullable: true
          description: 错误响应固定为 null。
        errors:
          type: object
          nullable: true
          description: 结构化错误详情。参数错误时直接使用字段名作为 key，例如 request、password；状态类错误使用 reason。
          additionalProperties: true
    RegisterRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          description: 登录账号，平台内唯一，不作为公开展示名
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]+$"
        password:
          type: string
          format: password
          description: MVP阶段请求体直接传原始密码字段，不做前端加密；后端保存时必须进行加盐哈希，不保存明文。8-32 位，至少包含字母和数字，允许字母、数字、下划线及常见符号 `_@#$%^&*.-`。
          minLength: 8
          maxLength: 32
          pattern: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d_@#$%^&*.-]+$"
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          description: 登录账号
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]+$"
        password:
          type: string
          format: password
          description: MVP阶段请求体直接传原始密码字段，不做前端加密；后端用该字段校验密码哈希。8-32 位，至少包含字母和数字，允许字母、数字、下划线及常见符号 `_@#$%^&*.-`。
          minLength: 8
          maxLength: 32
          pattern: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d_@#$%^&*.-]+$"
    LoginSession:
      type: object
      required:
      - token
      description: 认证成功后的会话令牌。完整用户资料请调用 GET /users/me 获取。
      properties:
        token:
          type: string
    UserMe:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: 当前用户标识，可用于读取头像等当前用户资源
        username:
          type: string
          description: 登录账号，仅当前用户本人可见
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]+$"
        studentIdMasked:
          type: string
          nullable: true
        realName:
          type: string
          nullable: true
          minLength: 2
          maxLength: 20
        nickname:
          type: string
          description: 公开展示昵称，可修改，可重复
          minLength: 1
          maxLength: 20
        college:
          type: string
          nullable: true
          maxLength: 50
        contact:
          type: string
          nullable: true
          description: 用户公开联系方式，可填写手机号、微信号、邮箱或其他联系方式。
          maxLength: 100
        authStatus:
          "$ref": "#/components/schemas/AuthStatus"
        role:
          type: string
          enum:
          - USER
          - ADMIN
        pointBalance:
          type: integer
          format: int64
          minimum: 0
          description: 当前用户的平台积分余额。积分为平台内虚拟资产，不可充值提现。
    UserPublicProfile:
      type: object
      properties:
        nickname:
          type: string
          description: 公开展示昵称
          minLength: 1
          maxLength: 20
        college:
          type: string
          nullable: true
          maxLength: 50
        contact:
          type: string
          nullable: true
          description: 用户公开联系方式，选填；未填写时为空或不展示。该字段属于用户主动填写的公开个人资料。
          maxLength: 100
        ratingSummary:
          "$ref": "#/components/schemas/RatingSummary"
          nullable: true
          description: 仅 includeRating=true 时返回，否则为空。
    UpdateProfileRequest:
      type: object
      minProperties: 1
      properties:
        nickname:
          type: string
          description: 公开展示昵称，可修改，可重复；不传表示不修改昵称
          minLength: 1
          maxLength: 20
        avatar:
          type: string
          format: binary
          nullable: true
          description: 可选头像图片，JPG/PNG，单张不超过5MB；不传表示不修改头像
        college:
          type: string
          nullable: true
          maxLength: 50
        contact:
          type: string
          nullable: true
          description: 可填写手机号、微信号、邮箱或其他联系方式；不传表示不修改联系方式。
          maxLength: 100
    VerificationSubmitRequest:
      type: object
      required:
      - studentId
      - realName
      - verificationImage
      properties:
        studentId:
          type: string
          minLength: 6
          maxLength: 20
          pattern: "^\\d+$"
        realName:
          type: string
          minLength: 2
          maxLength: 20
        verificationImage:
          type: string
          format: binary
          description: 一张实名认证材料照片，JPG/PNG，单张不超过5MB
    PickupCreateRequest:
      type: object
      description: rewardType=PAID 时 rewardAmount 必填，范围 1-200；rewardType=UNPAID 时 rewardAmount 必须为空。
      required:
      - campus
      - pickupLocation
      - deliveryLocation
      - itemDescription
      - pickupCredential
      - rewardType
      - acceptDeadline
      properties:
        campus:
          type: string
          description: GULOU=鼓楼校区，XIANLIN=仙林校区，PUKOU=浦口校区，SUZHOU=苏州校区。
          enum:
          - GULOU
          - XIANLIN
          - PUKOU
          - SUZHOU
        pickupLocation:
          type: string
          minLength: 1
          maxLength: 100
        deliveryLocation:
          type: string
          minLength: 1
          maxLength: 100
        itemDescription:
          type: string
          minLength: 1
          maxLength: 500
        pickupCredential:
          type: string
          format: binary
          description: 取件凭证图片，JPG/PNG，单张不超过5MB
        rewardType:
          "$ref": "#/components/schemas/RewardType"
        rewardAmount:
          type: number
          format: decimal
          minimum: 1
          maximum: 200
          nullable: true
          description: rewardType=PAID 时必填，范围 1-200；rewardType=UNPAID 时必须为空。
        acceptDeadline:
          type: string
          format: date-time
          description: 接单截止时间，必须晚于当前时间，建议至少晚于当前时间 10 分钟。
    PickupCreateResult:
      type: object
      properties:
        pickupId:
          type: integer
          format: int64
        status:
          "$ref": "#/components/schemas/PickupStatus"
    PickupAcceptResult:
      type: object
      properties:
        status:
          "$ref": "#/components/schemas/PickupStatus"
        acceptedAt:
          type: string
          format: date-time
    PickupRequestSummary:
      type: object
      properties:
