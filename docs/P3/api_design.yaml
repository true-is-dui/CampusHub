  "/pickup-requests":
    get:
      tags:
      - PickupRequests
      summary: 浏览代取服务公开列表
      description: 仅返回 WAITING_ACCEPT 状态的代取服务，支持校区和报酬类型筛选，固定按发布时间倒序展示。
      security: []
      parameters:
      - name: campus
        in: query
        required: false
        description: 不传表示查询全部校区。GULOU=鼓楼校区，XIANLIN=仙林校区，PUKOU=浦口校区，SUZHOU=苏州校区。
        schema:
          type: string
          enum:
          - GULOU
          - XIANLIN
          - PUKOU
          - SUZHOU
      - name: rewardType
        in: query
        required: false
        description: 不传表示查询全部报酬类型；传值时按有报酬或无报酬筛选。
        schema:
          "$ref": "#/components/schemas/RewardType"
      - "$ref": "#/components/parameters/Page"
      - "$ref": "#/components/parameters/PageSize"
      responses:
        '200':
          description: 代取服务分页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PickupRequestPage"
              example:
                code: 0
                message: ok
                data:
                  total: 1
                  page: 1
                  pageSize: 1
                  list:
                  - pickupId: 1
                    itemDescriptionPreview: string
                    campus: XIANLIN
                    pickupLocation: string
                    deliveryLocation: string
                    rewardType: PAID
                    rewardAmount: 1.0
                    status: WAITING_ACCEPT
                    cancelReason: null
                    publisher:
                      userId: 1
                      nickname: string
                    acceptDeadline: '2026-06-02T10:00:00'
                    createdAt: '2026-06-02T10:00:00'
        '400':
          description: 参数校验失败，包括非法 rewardType 或分页参数越界
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  rewardType: rewardType 只能为 PAID 或 UNPAID
    post:
      tags:
      - PickupRequests
      summary: 发布代取服务
      description: |
        发布代取服务。取件凭证图片随代取发布接口提交，由代取服务模块控制读取，不开放通用文件接口。

        后端保存文件时记录 uploaderId 和 fileUsage，仅用于上传记录追踪、审计排查和孤立文件清理，不表示文件最终业务归属。文件读取权限仍由所属业务模块控制，不开放通用文件读取接口。

        有报酬代取（rewardType=PAID）发布时后端从发布方积分余额中扣减相应报酬，扣减成功后服务直接进入 WAITING_ACCEPT；若发布方积分余额不足，发布失败并返回 409。无报酬代取（rewardType=UNPAID）不涉及积分，直接进入 WAITING_ACCEPT。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/PickupCreateRequest"
      responses:
        '200':
          description: 发布成功。无报酬服务进入 WAITING_ACCEPT；有报酬服务扣减发布方积分后进入 WAITING_ACCEPT。
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PickupCreateResult"
              example:
                code: 0
                message: ok
                data:
                  pickupId: 1
                  status: WAITING_ACCEPT
        '400':
          description: 参数校验失败或业务规则不满足
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  request: 请求参数格式或取值不合法
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '403':
          description: 无权限或账号状态不允许
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40301
                message: 无权限或账号状态不允许
                data: null
                errors:
                  reason: AUTH_STATUS_NOT_ALLOWED
        '409':
          description: 业务状态冲突，例如发布方积分余额不足以支付报酬
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40901
                message: 重复操作或业务冲突
                data: null
                errors:
                  reason: INSUFFICIENT_POINTS
