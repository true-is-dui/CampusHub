---
openapi: 3.0.3
info:
  title: CampusHub API
  version: 3.1.0
  description: |
    校园互助服务平台 API 规范。本文档已同步 P1 v2.1、P2 v1.2 和 P3 类设计。

    当前 MVP 范围聚焦可信代取服务闭环：用户注册登录、实名认证、实名审核、代取大厅、代取发布/接单/完成、我的代取记录、平台积分报酬、业务模块内图片处理和评价能力。

    字段校验口径：除特别说明外，字符串长度均按字符数计算，中文、英文、数字均按 1 个字符计；数据库字符集按 utf8mb4 考虑。该口径仅用于 API 字段约束说明，不改变业务流程。
servers:
- url: http://localhost:8080/api/v1
  description: 本地开发环境
- url: "${API_BASE_URL}/api/v1"
  description: 部署环境
tags:
- name: Auth
  description: 注册、登录
- name: Users
  description: 用户资料、实名认证、公开主页
- name: Notifications
  description: 站内通知查询与已读状态
- name: PickupRequests
  description: 代取服务
- name: Evaluations
  description: 评价与好评率
- name: Points
  description: 平台积分余额、签到与积分流水
- name: Admin
  description: 管理端实名认证审核
security:
- bearerAuth: []
paths:
  "/auth/register":
    post:
      tags:
      - Auth
      summary: 用户注册
      description: 使用用户名和密码注册。MVP阶段不接入运营商短信验证码，也不强制接入图形验证码；防机器人能力作为后续安全增强。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RegisterRequest"
      responses:
        '200':
          description: 注册成功。注册接口不签发 token，前端成功后跳转登录页面。
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      nullable: true
                      description: 无额外返回数据
              example:
                code: 0
                message: ok
                data: null
        '400':
          description: 参数校验失败或业务规则不满足
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  request: 请求参数格式或取值不合法
        '409':
          description: 重复操作或业务冲突
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40901
                message: 重复操作或业务冲突
                data: null
                errors:
                  reason: DUPLICATE_OR_CONFLICTED_OPERATION
  "/auth/login":
    post:
      tags:
      - Auth
      summary: 用户登录
      description: 使用用户名和密码登录。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: 登录成功。认证接口只返回会话令牌；完整用户资料由客户端携带 token 调用 GET /users/me 获取。
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/LoginSession"
              example:
                code: 0
                message: ok
                data:
                  token: string
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '403':
          description: 无权限或账号状态不允许
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40301
                message: 无权限或账号状态不允许
                data: null
                errors:
                  reason: AUTH_STATUS_NOT_ALLOWED
  "/users/me":
    get:
      tags:
      - Users
      summary: 获取当前用户信息
      description: '无路径参数和查询参数。客户端在 `Authorization: Bearer <token>` 请求头中携带登录接口返回的
        token，后端从 token 解析当前用户身份。'
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/UserMe"
              example:
                code: 0
                message: ok
                data:
                  userId: 1
                  username: string
                  studentIdMasked: string
                  realName: string
                  nickname: string
                  college: string
                  contact: string
                  authStatus: REVIEWING
                  role: USER
                  pointBalance: 100
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/profile":
    put:
      tags:
      - Users
      summary: 编辑个人资料
      description: |
        支持部分更新昵称、头像、学院和联系方式；头像图片不通过通用文件接口上传，而是随用户资料接口提交，由用户模块保存并控制读取。

        后端保存文件时记录 uploaderId 和 fileUsage，仅用于上传记录追踪、审计排查和孤立文件清理，不表示文件最终业务归属。文件读取权限仍由所属业务模块控制，不开放通用文件读取接口。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/UpdateProfileRequest"
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      nullable: true
                      description: 无额外返回数据
              example:
                code: 0
                message: ok
                data: null
        '400':
          description: 参数校验失败或业务规则不满足
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  request: 请求参数格式或取值不合法
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/verification":
    post:
      tags:
      - Users
      summary: 提交实名认证
      description: |
        认证材料照片不通过通用文件接口上传，而是随实名认证接口提交，由用户模块和管理模块控制读取。

        后端保存文件时记录 uploaderId 和 fileUsage，仅用于上传记录追踪、审计排查和孤立文件清理，不表示文件最终业务归属。文件读取权限仍由所属业务模块控制，不开放通用文件读取接口。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/VerificationSubmitRequest"
      responses:
        '200':
          description: 已提交审核
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        authStatus:
                          "$ref": "#/components/schemas/AuthStatus"
              example:
                code: 0
                message: ok
                data:
                  authStatus: REVIEWING
        '400':
          description: 参数校验失败或业务规则不满足
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  request: 请求参数格式或取值不合法
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '403':
          description: 无权限或账号状态不允许
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40301
                message: 无权限或账号状态不允许
                data: null
                errors:
                  reason: AUTH_STATUS_NOT_ALLOWED
        '409':
          description: 重复操作或业务冲突
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40901
                message: 重复操作或业务冲突
                data: null
                errors:
                  reason: DUPLICATE_OR_CONFLICTED_OPERATION
  "/users/{userId}/profile":
    get:
      tags:
      - Users
      summary: 查看用户公开主页
      security: []
      parameters:
      - "$ref": "#/components/parameters/UserIdPath"
      - name: includeRating
        in: query
        required: false
        description: 为 true 时返回 ratingSummary；不传或为 false 时 ratingSummary 可为空。
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: 用户公开主页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/UserPublicProfile"
              example:
                code: 0
                message: ok
                data:
                  nickname: string
                  college: string
                  contact: string
                  ratingSummary: null
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40401
                message: 资源不存在
                data: null
                errors:
                  reason: RESOURCE_NOT_FOUND
  "/users/{userId}/avatar":
    get:
      tags:
      - Users
      summary: 获取用户头像
      description: 头像通过用户模块读取，不开放通用文件读取接口。
      security: []
      parameters:
      - "$ref": "#/components/parameters/UserIdPath"
      responses:
        '200':
          description: 头像图片二进制内容
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40401
                message: 资源不存在
                data: null
                errors:
                  reason: RESOURCE_NOT_FOUND
  "/users/{userId}/rating-summary":
    get:
      tags:
      - Evaluations
      summary: 查询用户好评率摘要
      security: []
      parameters:
      - "$ref": "#/components/parameters/UserIdPath"
      responses:
        '200':
          description: 好评率摘要
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/RatingSummary"
              example:
                code: 0
                message: ok
                data:
                  userId: 1
                  publisherRoleSummary:
                    revieweeRoleInBusiness: PUBLISHER
                    positiveCount: 1
                    neutralCount: 0
                    negativeCount: 0
                    totalCount: 1
                    positiveRate: 1.0
                  acceptorRoleSummary:
                    revieweeRoleInBusiness: ACCEPTOR
                    positiveCount: 1
                    neutralCount: 0
                    negativeCount: 0
                    totalCount: 1
                    positiveRate: 1.0
  "/users/{userId}/evaluations":
    get:
      tags:
      - Evaluations
      summary: 查询用户收到的评价列表
      security: []
      parameters:
      - "$ref": "#/components/parameters/UserIdPath"
      - "$ref": "#/components/parameters/Page"
      - "$ref": "#/components/parameters/PageSize"
      responses:
        '200':
          description: 评价分页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/EvaluationHistoryPage"
              example:
                code: 0
                message: ok
                data:
                  total: 1
                  page: 1
                  pageSize: 1
                  list:
                  - evaluationId: 1
                    revieweeRoleInBusiness: PUBLISHER
                    ratingLevel: GOOD
                    contentPreview: string
                    createdAt: '2026-06-02T10:00:00'
  "/users/me/pickup-requests":
    get:
      tags:
      - PickupRequests
      summary: 查询当前用户参与的代取服务
      description: 查询当前用户参与的代取服务。role=PUBLISHER 表示查询当前用户发布的代取服务，role=ACCEPTOR 表示查询当前用户接单的代取服务，返回 PickupSummary 列表。
      parameters:
      - name: role
        in: query
        required: true
        schema:
          "$ref": "#/components/schemas/PickupParticipantRole"
      - name: status
        in: query
        required: false
        description: 不传表示查询全部状态；传值时按指定代取状态筛选。
        schema:
          "$ref": "#/components/schemas/PickupStatus"
      - "$ref": "#/components/parameters/Page"
      - "$ref": "#/components/parameters/PageSize"
      responses:
        '200':
          description: 当前用户参与的代取服务分页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PickupSummaryPage"
              example:
                code: 0
                message: ok
                data:
                  total: 1
                  page: 1
                  pageSize: 1
                  list:
                  - pickupId: 1
                    campus: XIANLIN
                    pickupLocation: string
                    deliveryLocation: string
                    itemDescriptionPreview: string
                    rewardType: PAID
                    rewardAmount: 1.0
                    status: WAITING_ACCEPT
                    cancelReason: null
                    createdAt: '2026-06-02T10:00:00'
                    completedAt: null
        '400':
          description: 参数校验失败，包括缺少或非法 role、非法 status、分页参数越界
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40001
                message: 参数校验失败
                data: null
                errors:
                  role: role 必填且只能为 PUBLISHER 或 ACCEPTOR
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/point-balance":
    get:
      tags:
      - Points
      summary: 查询我的积分余额
      description: 查询当前用户的平台积分余额。积分为平台内虚拟资产，不可充值提现。
      responses:
        '200':
          description: 积分余额
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        pointBalance:
                          type: integer
                          format: int64
                          minimum: 0
              example:
                code: 0
                message: ok
                data:
                  pointBalance: 100
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/check-in":
    post:
      tags:
      - Points
      summary: 每日签到领取积分
      description: 当前用户每日首次签到获得固定积分（当前 MVP 为 5 积分），每日仅可领取一次；当日已签到再次调用返回 409。
      responses:
        '200':
          description: 签到成功，返回本次获得积分与当前余额
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/CheckInResult"
              example:
                code: 0
                message: ok
                data:
                  earnedPoints: 5
                  pointBalance: 105
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
        '409':
          description: 当日已签到，不能重复领取
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40901
                message: 重复操作或业务冲突
                data: null
                errors:
                  reason: ALREADY_CHECKED_IN_TODAY
  "/users/me/point-transactions":
    get:
      tags:
      - Points
      summary: 查询我的积分流水
      description: 查询当前用户的积分变动记录，包括认证赠送、每日签到、发布扣减、取消退回和完成入账。支持按流水类型筛选。
      parameters:
      - name: type
        in: query
        required: false
        description: 不传表示查询全部类型；传值时按指定流水类型筛选。
        schema:
          "$ref": "#/components/schemas/PointTransactionType"
      - "$ref": "#/components/parameters/Page"
      - "$ref": "#/components/parameters/PageSize"
      responses:
        '200':
          description: 积分流水分页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/PointTransactionPage"
              example:
                code: 0
                message: ok
                data:
                  total: 1
                  page: 1
                  pageSize: 20
                  list:
                  - transactionId: 1
                    type: EARN_VERIFICATION
                    amount: 100
                    balanceAfter: 100
                    relatedPickupId: null
                    createdAt: '2026-06-02T10:00:00'
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/notifications":
    get:
      tags:
      - Notifications
      summary: 查询当前用户站内通知列表
      description: 站内通知仅通过 HTTP 查询/轮询获取，当前 MVP 不引入 WebSocket。
      parameters:
      - "$ref": "#/components/parameters/Page"
      - "$ref": "#/components/parameters/PageSize"
      responses:
        '200':
          description: 通知分页
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      "$ref": "#/components/schemas/NotificationPage"
              example:
                code: 0
                message: ok
                data:
                  total: 1
                  page: 1
                  pageSize: 20
                  list:
                  - notificationId: 1
                    type: SYSTEM
                    title: string
                    content: string
                    businessType: PICKUP_REQUEST
                    businessId: 1
                    readStatus: UNREAD
                    createdAt: '2026-06-02T10:00:00'
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/notifications/unread-count":
    get:
      tags:
      - Notifications
      summary: 查询当前用户未读通知数量
      description: 用于前端轮询未读数量，不引入 WebSocket 推送。
      responses:
        '200':
          description: 未读通知数量
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        unreadCount:
                          type: integer
                          minimum: 0
              example:
                code: 0
                message: ok
                data:
                  unreadCount: 3
        '401':
          description: 未登录或Token过期
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                code: 40101
                message: 未登录或登录已过期
                data: null
                errors:
                  reason: TOKEN_MISSING_OR_EXPIRED
  "/users/me/notifications/{notificationId}/read":
    post:
      tags:
      - Notifications
      summary: 将单条通知标记为已读
      description: 仅当前通知接收者可操作。
      parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/ApiResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      nullable: true
                      description: 无额外返回数据
              example:
                code: 0
                message: ok
                data: null
