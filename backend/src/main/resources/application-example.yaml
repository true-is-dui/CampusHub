# 配置模板 —— 复制本文件为 application-local.yaml 并填入本机真实值。
# application-local.yaml 已被 .gitignore 忽略，不会提交。
#
# 也可以不建 application-local.yaml，改为在启动环境中设置以下环境变量：
#   DB_URL / DB_USERNAME / DB_PASSWORD / JWT_SECRET
#
# Spring Boot 会自动加载 application-local.yaml（如存在）并覆盖 application.yaml 中的同名项。

spring:
  datasource:
#    url: ${DB_URL:jdbc:mysql://localhost:3306/你的数据库名称?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
#    username: ${DB_USERNAME:你的用户名}
    password: ${DB_PASSWORD:你的数据库密码}

# JWT 签名密钥：HS256 要求至少 32 字节（32 个 ASCII 字符即可）。
# 自行生成一串足够长的随机字符串填入，切勿提交真实值。
jwt:
  secret: ${JWT_SECRET:在此填入至少32字节的随机密钥}
#  expiration: ${JWT_EXPIRATION:jwt过期时间}

#file:
#  storage:
#    root: ${FILE_STORAGE_ROOT:后端文件存储目录}
