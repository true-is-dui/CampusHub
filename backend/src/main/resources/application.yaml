server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: campushub

  # 可选导入本机私有配置（存在则加载，不存在不报错）。
  # application-local.yaml 被 .gitignore 忽略，用于本机覆盖数据库等敏感配置。
  config:
    import: optional:classpath:application-local.yaml

  # 数据库连接：值通过占位符外部化，仓库内不含真实密码。
  # 查找顺序：环境变量 > application-local.yaml 覆盖 > 冒号后默认值。
  #   开发：在 application-local.yaml 中提供（该文件被 .gitignore 忽略）
  #   生产：通过环境变量 / docker-compose 注入 DB_URL、DB_USERNAME、DB_PASSWORD
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campushub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  servlet:
    multipart:
      # 单张图片上限对齐 api_design.yaml 契约（≤5MB）；超限由框架抛
      # MaxUploadSizeExceededException，经 GlobalExceptionHandler 翻成 40001。
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  # 预留手写 XML 的位置；当前 MVP 主要用 BaseMapper，暂无 XML
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campushub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 鉴权配置：secret 外部化，仓库内不含真实密钥。
#   开发：在 application-local.yaml 中提供 jwt.secret（该文件被 .gitignore 忽略）
#   生产：通过环境变量 JWT_SECRET 注入；HS256 要求密钥至少 32 字节
# expiration 支持 24h / 30m 等写法。
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:24h}

file:
  storage:
    root: ${FILE_STORAGE_ROOT:uploads}

logging:
  level:
    com.campushub: debug
