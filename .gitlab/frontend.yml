# 学校 GitLab Runner 不稳定，因此保留最小但完整的前端安装与构建流程。
stages:
  - build
  - docker-build

cache:
  paths:
    - frontend/node_modules/

frontend-build:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: always
    paths:
      - frontend/dist/

frontend-docker-build:
  stage: docker-build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    FRONTEND_IMAGE: "ghcr.io/$GHCR_NAMESPACE/campushub-frontend:latest"
  dependencies:
    - frontend-build
  script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
    - docker build -f ./frontend/Dockerfile-prod -t "$FRONTEND_IMAGE" ./frontend
    - docker push "$FRONTEND_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
