# 学校 GitLab Runner 不稳定，因此本配置以“可执行、可复现”为目标；
# 即使流水线偶发未成功调度，仓库内也保留了完整测试与构建定义。
stages:
  - test
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

backend-test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - cd backend
    - mvn verify
  artifacts:
    when: always
    paths:
      - backend/target/surefire-reports/
      - backend/target/site/jacoco/

backend-build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - cd backend
    - mvn -DskipTests package
  artifacts:
    when: always
    paths:
      - backend/target/*.jar
