server {
    listen 80;
    server_name campushub.trueisdui.online;

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name campushub.trueisdui.online;

    ssl_certificate /etc/letsencrypt/live/campushub.trueisdui.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campushub.trueisdui.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # 前端静态资源转发
    location / {
        proxy_pass http://frontend:8081;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端接口转发
    location /api/ {
        proxy_pass http://backend:8080/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}