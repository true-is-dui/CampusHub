services:
  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../frontend:/app
    command: sh -c "npm ci && npm run build"

  mysql:
    image: mysql:8.0
    container_name: campushub-mysql-test
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai

    ports:
      - "3307:3306"

    volumes:
      - mysql-data-test:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - campushub-net-test

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile

    container_name: campushub-backend-test
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT}

    volumes:
      - backend-file-root-test:${FILE_STORAGE_ROOT}

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - campushub-net-test

  nginx:
    image: nginx:1.27-alpine
    container_name: campushub-nginx-test
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro

    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully

    networks:
      - campushub-net-test

volumes:
  mysql-data-test:
  backend-file-root-test:

networks:
  campushub-net-test:
    driver: bridge