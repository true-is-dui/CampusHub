name: CI/CD

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn verify

  backend-build-and-push:
    name: Backend Build and Push
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend jar
        working-directory: backend
        run: mvn -DskipTests package

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: docker build -f ./backend/Dockerfile-prod -t "${{ vars.BACKEND_IMAGE }}" ./backend

      - name: Push backend image
        run: docker push "${{ vars.BACKEND_IMAGE }}"

  frontend-build-and-push:
    name: Frontend Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build frontend image
        run: docker build -f ./frontend/Dockerfile-prod -t "${{ vars.FRONTEND_IMAGE }}" ./frontend

      - name: Push frontend image
        run: docker push "${{ vars.FRONTEND_IMAGE }}"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - backend-build-and-push
      - frontend-build-and-push

    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PROJECT_DIR }}
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
            docker image prune -f